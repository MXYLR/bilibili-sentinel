<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>{% block title %}B站哨兵{% endblock %} — 水军检测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check"></i> B站哨兵
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2"></i> 总览
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/video') %}active{% endif %}" href="/">
                            <i class="bi bi-camera-video"></i> 视频监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/crawler' %}active{% endif %}" href="/crawler">
                            <i class="bi bi-gear"></i> 爬虫控制
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">
                            <i class="bi bi-sliders"></i> 系统设置
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/water-army' %}active{% endif %}" href="/water-army">
                            <i class="bi bi-shield-exclamation"></i> 水军账号
                        </a>
                    </li>
                </ul>
                <span class="navbar-text" id="system-status-bar">
                    <span class="status-dot status-loading"></span> 加载中...
                </span>
            </div>
        </div>
    </nav>

    <main class="container mt-3 mb-5">
        {% block content %}{% endblock %}
    </main>

    <!-- 全局删除确认 Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill"></i> 确认删除</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="deleteConfirmBody">
                    确定要删除这些数据吗？此操作不可撤销。
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteConfirmBtn">
                        <i class="bi bi-trash-fill"></i> 确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除进度 Modal -->
    <div class="modal fade" id="deleteProgressModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="bi bi-arrow-repeat spinner-icon"></i> 正在删除</h5>
                </div>
                <div class="modal-body text-center py-4">
                    <div id="delete-progress-text" class="mb-3 text-muted">准备中...</div>
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
                             id="delete-progress-bar" role="progressbar" style="width: 0%">0%</div>
                    </div>
                    <small class="text-muted mt-2 d-block" id="delete-progress-count">0 / 0</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="delete-cancel-btn" style="display:none">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="/static/js/bootstrap.bundle.min.js" defer></script>

    {# ---- 右下角调试控制台（可拖动） ---- #}
    <div id="debug-fab" class="position-fixed" style="bottom:24px;right:24px;z-index:1090;cursor:grab;user-select:none">
        <button class="btn btn-dark rounded-circle shadow d-flex align-items-center justify-content-center"
                style="width:52px;height:52px" title="调试控制台">
            <i class="bi bi-terminal fs-5"></i>
        </button>
    </div>

    <div id="debug-panel" class="position-fixed bg-dark text-light border border-secondary rounded-3 shadow-lg"
         style="display:none;bottom:86px;right:24px;width:520px;max-height:75vh;z-index:1091;flex-direction:column;overflow:hidden">
        <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom border-secondary bg-black bg-opacity-25"
             id="debug-panel-header" style="cursor:grab;user-select:none">
            <span class="small fw-bold" style="pointer-events:none"><i class="bi bi-terminal"></i> 调试控制台</span>
            <div class="d-flex gap-2">
                <span id="debug-mode-badge" class="badge bg-secondary small">HTTP</span>
                <button class="btn btn-sm btn-outline-light py-0 px-1" onclick="clearDebugLog()" title="清空">🗑</button>
                <button class="btn btn-sm btn-outline-light py-0 px-1" onclick="toggleDebugPanel()" title="关闭">✕</button>
            </div>
        </div>
        <div id="debug-log" class="p-2 overflow-auto flex-grow-1" style="font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.5;max-height:60vh;display:none"></div>
        <div id="aicu-log" class="p-2 overflow-auto flex-grow-1" style="font-family:'Cascadia Code',Consolas,monospace;font-size:11px;line-height:1.5;max-height:60vh;display:none"><div class="text-muted small p-2">暂无 AICU 分析日志。<br>在视频详情页执行深度分析后，日志将显示在这里。</div></div>
        <div class="px-2 py-1 border-top border-secondary bg-black bg-opacity-10 d-flex gap-1 flex-wrap align-items-center">
            <span class="text-muted small me-1">模式:</span>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2 active" id="btn-mode-http" onclick="switchDebugMode('http')">HTTP</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" id="btn-mode-crawler" onclick="switchDebugMode('crawler')">爬虫</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" id="btn-mode-aicu" onclick="switchDebugMode('aicu')">AICU</button>
            <span class="text-muted small mx-1">|</span>
            <span id="crawler-log-controls" style="display:none" class="d-flex align-items-center gap-1">
                <select id="crawler-log-spider" class="form-select form-select-sm py-0" style="width:auto;font-size:11px" onchange="switchCrawlerLog()">
                    <option value="bilibili_video">视频爬虫</option>
                    <option value="bilibili_comment">评论爬虫</option>
                    <option value="bilibili_user">用户爬虫</option>
                    <option value="bilibili_danmaku">弹幕爬虫</option>
                    <option value="bilibili_up_videos">UP主视频爬虫</option>
                </select>
                <span id="crawler-stream-status" class="text-muted small">⏸</span>
            </span>
            <span class="ms-auto d-flex gap-1">
                <button class="btn btn-sm btn-outline-success py-0 px-2" onclick="debugFetch('/api/system/health')">Health</button>
                <button class="btn btn-sm btn-outline-info py-0 px-2" onclick="debugFetch('/api/system/status')">Status</button>
                <button class="btn btn-sm btn-outline-warning py-0 px-2" onclick="debugFetch('/api/llm/status')">LLM</button>
            </span>
        </div>
    </div>

    <script>
    // ---- 全局调试日志 ----
    var _debugLogs = [];
    var _aicuLogLines = [];             // AICU 日志缓冲区（最多 300 行）
    var _debugPanelOpen = false;
    var _debugMode = 'http';           // 'http' | 'crawler' | 'aicu'
    var _crawlerEventSource = null;
    var _crawlerLogLines = [];         // 爬虫日志缓冲区（最多 500 行）

    function initDebugFab() {
        // 注册按钮拖动
        var fab = document.getElementById('debug-fab');
        if (fab) fab.addEventListener('mousedown', startFabDrag);
        // 注册面板拖动
        var pnlHdr = document.getElementById('debug-panel-header');
        if (pnlHdr) pnlHdr.addEventListener('mousedown', startPanelDrag);
        // 注册 fetch 拦截
        if (!window.__debugFetchPatched) {
            const _origFetch = window.fetch;
            window.fetch = function(...args) {
                const [url, opts] = args;
                const method = (opts && opts.method) || 'GET';
                const start = Date.now();
                return _origFetch.apply(this, args).then(resp => {
                    const ms = Date.now() - start;
                    const entry = {
                        t: new Date().toLocaleTimeString(),
                        method, url: typeof url === 'string' ? url : url.url,
                        status: resp.status, ms, ok: resp.ok
                    };
                    _debugLogs.unshift(entry);
                    if (_debugLogs.length > 200) _debugLogs.pop();
                    if (_debugMode === 'http') renderDebugLog();
                    return resp;
                }).catch(err => {
                    const entry = {
                        t: new Date().toLocaleTimeString(),
                        method, url: typeof url === 'string' ? url : url.url,
                        status: 0, ms: Date.now()-start, ok: false, err: err.message
                    };
                    _debugLogs.unshift(entry);
                    if (_debugMode === 'http') renderDebugLog();
                    throw err;
                });
            };
            window.__debugFetchPatched = true;
        }
    }
    document.addEventListener('DOMContentLoaded', initDebugFab);

    function toggleDebugPanel() {
        _debugPanelOpen = !_debugPanelOpen;
        const panel = document.getElementById('debug-panel');
        if (panel) panel.style.display = _debugPanelOpen ? 'flex' : 'none';
        if (_debugPanelOpen) renderDebugLog();
    }

    function switchDebugMode(mode) {
        _debugMode = mode;
        const badge = document.getElementById('debug-mode-badge');
        const btnHttp = document.getElementById('btn-mode-http');
        const btnCrawler = document.getElementById('btn-mode-crawler');
        const btnAicu = document.getElementById('btn-mode-aicu');
        const debugLog = document.getElementById('debug-log');
        const aicuLog = document.getElementById('aicu-log');
        const controls = document.getElementById('crawler-log-controls');

        [btnHttp, btnCrawler, btnAicu].forEach(b => b && b.classList.remove('active'));
        if (debugLog) debugLog.style.display = 'none';
        if (aicuLog) aicuLog.style.display = 'none';

        if (mode === 'crawler') {
            badge.textContent = '爬虫日志'; badge.className = 'badge bg-info small';
            if (btnCrawler) btnCrawler.classList.add('active');
            if (controls) controls.style.display = '';
            if (debugLog) debugLog.style.display = 'block';
            startCrawlerStream();
        } else if (mode === 'aicu') {
            badge.textContent = 'AICU日志'; badge.className = 'badge bg-primary small';
            if (btnAicu) btnAicu.classList.add('active');
            if (controls) controls.style.display = 'none';
            if (aicuLog) aicuLog.style.display = 'block';
            stopCrawlerStream();
        } else {
            badge.textContent = 'HTTP'; badge.className = 'badge bg-secondary small';
            if (btnHttp) btnHttp.classList.add('active');
            if (controls) controls.style.display = 'none';
            if (debugLog) debugLog.style.display = 'block';
            stopCrawlerStream();
        }
        renderDebugLog();
    }

    function switchCrawlerLog() {
        if (_debugMode === 'crawler') startCrawlerStream();
    }

    function startCrawlerStream() {
        stopCrawlerStream();
        _crawlerLogLines = [];

        const spider = document.getElementById('crawler-log-spider')?.value || 'bilibili_video';
        const statusEl = document.getElementById('crawler-stream-status');
        if (statusEl) statusEl.textContent = '⏳';

        _crawlerEventSource = new EventSource('/api/crawler/stream/' + spider);

        _crawlerEventSource.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'ready' || data.type === 'timeout') {
                    if (statusEl && data.type === 'ready') statusEl.textContent = '🟢';
                    return;
                }
                if (data.type === 'truncated') {
                    _crawlerLogLines.push({ text: data.message, cls: 'text-warning' });
                } else if (data.line) {
                    const line = data.line;
                    let cls = '';
                    if (line.includes('[ERROR]') || line.includes('ERROR:')) cls = 'text-danger';
                    else if (line.includes('[WARNING]') || line.includes('WARNING:')) cls = 'text-warning';
                    else if (line.includes('DEBUG:')) cls = 'text-muted';
                    else if (line.includes('scrapy.core.engine')) cls = 'text-info';
                    _crawlerLogLines.push({ text: line, cls: cls });
                }
                // 限制 500 行
                if (_crawlerLogLines.length > 500) _crawlerLogLines = _crawlerLogLines.slice(-500);
                if (_debugPanelOpen && _debugMode === 'crawler') renderDebugLog();
            } catch(e) {}
        };

        _crawlerEventSource.onerror = function() {
            if (statusEl) statusEl.textContent = '🔴';
        };

        _crawlerEventSource.onopen = function() {
            if (statusEl) statusEl.textContent = '🟢';
        };
    }

    function stopCrawlerStream() {
        if (_crawlerEventSource) {
            _crawlerEventSource.close();
            _crawlerEventSource = null;
        }
        const statusEl = document.getElementById('crawler-stream-status');
        if (statusEl) statusEl.textContent = '⏸';
    }

    function renderDebugLog() {
        if (!_debugPanelOpen) return;

        if (_debugMode === 'crawler') {
            const el = document.getElementById('debug-log');
            if (!el) return;
            el.innerHTML = _crawlerLogLines.length === 0
                ? '<div class="text-muted small p-2">正在连接爬虫日志流...</div>'
                : _crawlerLogLines.map(l =>
                    `<div class="${l.cls || ''}" style="border-bottom:1px solid #1e293b;padding:1px 0;white-space:pre-wrap;word-break:break-all">${l.text}</div>`
                  ).join('');
            el.scrollTop = el.scrollHeight;
        } else if (_debugMode === 'aicu') {
            const el = document.getElementById('aicu-log');
            if (!el) return;
            el.innerHTML = _aicuLogLines.length === 0
                ? '<div class="text-muted small p-2">暂无 AICU 分析日志。<br>在视频详情页执行深度分析后，日志将显示在这里。</div>'
                : _aicuLogLines.map(l =>
                    `<div class="${l.cls || ''}" style="border-bottom:1px solid #1e293b;padding:1px 0;white-space:pre-wrap;word-break:break-all">${l.text}</div>`
                  ).join('');
            el.scrollTop = el.scrollHeight;
        } else {
            const el = document.getElementById('debug-log');
            if (!el) return;
            el.innerHTML = _debugLogs.slice(0, 80).map(e => {
                const color = e.ok ? '#4ade80' : '#f87171';
                const errTag = e.err ? ` <span style="color:#fbbf24">${e.err}</span>` : '';
                return `<div style="border-bottom:1px solid #1e293b;padding:2px 0">
                    <span class="text-muted">${e.t}</span>
                    <span style="color:#38bdf8">${e.method}</span>
                    <span style="color:${color}">${e.status}</span>
                    <span class="text-muted">${e.ms}ms</span>
                    <span style="word-break:break-all">${e.url.split('?')[0]}</span>
                    ${errTag}
                </div>`;
            }).join('') || '<div class="text-muted small p-2">暂无请求日志</div>';
            el.scrollTop = el.scrollHeight;
        }

    }

    function clearDebugLog() {
        if (_debugMode === 'crawler') {
            _crawlerLogLines = [];
        } else if (_debugMode === 'aicu') {
            _aicuLogLines = [];
        } else {
            _debugLogs.length = 0;
        }
        renderDebugLog();
    }

    async function debugFetch(url) {
        const el = document.getElementById('debug-log');
        if (el && _debugMode === 'http') el.innerHTML += `<div class="text-info small">➤ GET ${url}</div>`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            if (el && _debugMode === 'http') el.innerHTML += `<div class="text-success small">✓ ${JSON.stringify(d).substring(0,300)}</div>`;
        } catch(e) {
            if (el && _debugMode === 'http') el.innerHTML += `<div class="text-danger small">✗ ${e.message}</div>`;
        }
    }

    // ---- AICU 日志输出 ----
    window.consoleLog = function(msg, level) {
        level = level || 'info';
        // 自动打开面板并切换到 AICU 模式
        if (!_debugPanelOpen) toggleDebugPanel();
        if (_debugMode !== 'aicu') switchDebugMode('aicu');
        var cls = '';
        if (level === 'success') cls = 'text-success';
        else if (level === 'warn') cls = 'text-warning';
        else if (level === 'error') cls = 'text-danger';
        else cls = 'text-info';
        var now = new Date();
        var ts = now.toTimeString().slice(0, 8);
        _aicuLogLines.push({ text: '[' + ts + '] ' + msg, cls: cls });
        if (_aicuLogLines.length > 300) _aicuLogLines = _aicuLogLines.slice(-300);
        renderDebugLog();
    };

    // ---- 浮动按钮拖动 ----
    var _fabDragging = false, _fabStartX = 0, _fabStartY = 0, _fabStartLeft = 0, _fabStartTop = 0, _fabMoved = false;
    window.startFabDrag = function(e) {
        if (e.button !== 0) return;
        e.preventDefault();
        var fab = document.getElementById('debug-fab');
        _fabDragging = true; _fabMoved = false;
        _fabStartX = e.clientX; _fabStartY = e.clientY;
        _fabStartLeft = fab.offsetLeft; _fabStartTop = fab.offsetTop;
        fab.style.cursor = 'grabbing';
        document.addEventListener('mousemove', _onFabDrag);
        document.addEventListener('mouseup', _onFabDrop);
    };
    function _onFabDrag(e) {
        if (!_fabDragging) return;
        var dx = e.clientX - _fabStartX, dy = e.clientY - _fabStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _fabMoved = true;
        var fab = document.getElementById('debug-fab');
        fab.style.left = Math.max(8, Math.min(window.innerWidth - 68, _fabStartLeft + dx)) + 'px';
        fab.style.top = Math.max(8, Math.min(window.innerHeight - 68, _fabStartTop + dy)) + 'px';
        fab.style.bottom = 'auto'; fab.style.right = 'auto';
    }
    function _onFabDrop(e) {
        _fabDragging = false;
        var fab = document.getElementById('debug-fab');
        fab.style.cursor = 'grab';
        document.removeEventListener('mousemove', _onFabDrag);
        document.removeEventListener('mouseup', _onFabDrop);
        if (!_fabMoved) toggleDebugPanel();
    }

    // ---- 面板拖动 ----
    var _pnlDragging = false, _pnlStartX = 0, _pnlStartY = 0, _pnlStartLeft = 0, _pnlStartTop = 0;
    window.startPanelDrag = function(e) {
        if (e.target.closest('button') || e.target.closest('select')) return;
        e.preventDefault();
        var pnl = document.getElementById('debug-panel');
        _pnlDragging = true;
        _pnlStartX = e.clientX; _pnlStartY = e.clientY;
        _pnlStartLeft = pnl.offsetLeft; _pnlStartTop = pnl.offsetTop;
        document.getElementById('debug-panel-header').style.cursor = 'grabbing';
        document.addEventListener('mousemove', _onPanelDrag);
        document.addEventListener('mouseup', _onPanelDrop);
    };
    function _onPanelDrag(e) {
        if (!_pnlDragging) return;
        var pnl = document.getElementById('debug-panel');
        pnl.style.left = Math.max(0, Math.min(window.innerWidth - 200, _pnlStartLeft + (e.clientX - _pnlStartX))) + 'px';
        pnl.style.top = Math.max(0, Math.min(window.innerHeight - 40, _pnlStartTop + (e.clientY - _pnlStartY))) + 'px';
        pnl.style.bottom = 'auto'; pnl.style.right = 'auto';
    }
    function _onPanelDrop() {
        _pnlDragging = false;
        var hdr = document.getElementById('debug-panel-header');
        if (hdr) hdr.style.cursor = 'grab';
        document.removeEventListener('mousemove', _onPanelDrag);
        document.removeEventListener('mouseup', _onPanelDrop);
    }

    // 页面卸载时关闭 SSE 连接
    window.addEventListener('beforeunload', () => stopCrawlerStream());
    </script>

    <script>
    // 全局系统状态轮询
    function updateSystemStatusBar() {
        fetch('/api/system/status')
            .then(r => r.json())
            .then(d => {
                if (!d.success) return;
                const bar = document.getElementById('system-status-bar');
                if (!bar) return;
                const s = d.data;
                const ok = s.modules_healthy;
                bar.innerHTML = ok
                    ? '<span class="status-dot status-ok"></span> 系统正常'
                    : '<span class="status-dot status-warn"></span> 部分异常';
                bar.className = 'navbar-text' + (ok ? ' status-healthy' : ' status-warn');
            })
            .catch(() => {
                const bar = document.getElementById('system-status-bar');
                if (bar) {
                    bar.innerHTML = '<span class="status-dot status-err"></span> 离线';
                    bar.className = 'navbar-text status-error';
                }
            });
    }
    document.addEventListener('DOMContentLoaded', updateSystemStatusBar);
    setInterval(updateSystemStatusBar, 30000);

    // 全局 Toast
    function showToast(msg, type) {
        type = type || 'info';
        const icon = {'success':'check-circle','error':'exclamation-circle','warning':'exclamation-triangle','info':'info-circle'}[type] || 'info-circle';
        const color = {'success':'#198754','error':'#dc3545','warning':'#fd7e14','info':'#0d6efd'}[type] || '#0d6efd';
        const container = document.querySelector('.toast-container');
        const id = 't' + Date.now();
        container.innerHTML += `<div id="${id}" class="toast" role="alert"><div class="toast-header">
            <i class="bi bi-${icon} me-2" style="color:${color}"></i>
            <strong class="me-auto">${type === 'error' ? '错误' : type === 'success' ? '成功' : '提示'}</strong>
            <button class="btn-close btn-close-sm" data-bs-dismiss="toast"></button>
        </div><div class="toast-body">${msg}</div></div>`;
        const el = document.getElementById(id);
        const toast = new bootstrap.Toast(el, {delay: 4000});
        toast.show();
        el.addEventListener('hidden.bs.toast', () => el.remove());
    }

    // 全局删除确认弹窗
    function confirmDelete(message, onConfirm) {
        const modal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
        document.getElementById('deleteConfirmBody').textContent = message;
        const btn = document.getElementById('deleteConfirmBtn');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', () => {
            newBtn.disabled = true;
            newBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 删除中...';
            onConfirm()
                .then(() => modal.hide())
                .catch(() => { newBtn.disabled = false; newBtn.innerHTML = '<i class="bi bi-trash-fill"></i> 确认删除'; });
        });
        modal.show();
    }

    // 带进度条的删除确认
    let deleteProgressModal = null;
    function confirmDeleteWithProgress(message, onStart, onDone) {
        // 先确认
        if (!confirm(message.replace('正在删除','确定要删除') + '\n\n此操作不可撤销！')) return;

        if (!deleteProgressModal) {
            deleteProgressModal = new bootstrap.Modal(document.getElementById('deleteProgressModal'));
        }
        // 重置进度条状态
        document.getElementById('delete-progress-text').textContent = '准备中...';
        const bar = document.getElementById('delete-progress-bar');
        bar.style.width = '0%';
        bar.textContent = '0%';
        bar.classList.remove('bg-secondary');
        bar.classList.add('progress-bar-animated', 'bg-danger');
        document.getElementById('delete-progress-count').textContent = '0 / 0';
        // 重置取消按钮
        const cancelBtn = document.getElementById('delete-cancel-btn');
        cancelBtn.style.display = 'none';
        cancelBtn.onclick = null;
        deleteProgressModal.show();

        onStart().then(() => {
            // 等 Modal 动画完成后再关闭，避免 backdrop 残留
            setTimeout(() => {
                deleteProgressModal.hide();
                // 强制清理可能残留的 backdrop
                const backdrop = document.querySelector('.modal-backdrop');
                if (backdrop) backdrop.remove();
                document.body.classList.remove('modal-open');
                document.body.style.removeProperty('overflow');
                document.body.style.removeProperty('padding-right');
                setTimeout(onDone, 100);
            }, 800);
        }).catch(err => {
            document.getElementById('delete-progress-text').textContent = '删除失败: ' + err.message;
            bar.classList.remove('progress-bar-animated', 'bg-danger');
            bar.classList.add('bg-secondary');
            cancelBtn.style.display = 'inline-block';
            cancelBtn.onclick = () => {
                deleteProgressModal.hide();
                const bd = document.querySelector('.modal-backdrop');
                if (bd) bd.remove();
                document.body.classList.remove('modal-open');
                document.body.style.removeProperty('overflow');
                document.body.style.removeProperty('padding-right');
                onDone();
            };
        });
    }

    function updateDeleteProgress(done, total, text) {
        const pct = total > 0 ? Math.round(done * 100 / total) : 0;
        document.getElementById('delete-progress-text').textContent = text || `已删除 ${done}/${total}...`;
        document.getElementById('delete-progress-bar').style.width = pct + '%';
        document.getElementById('delete-progress-bar').textContent = pct + '%';
        document.getElementById('delete-progress-count').textContent = done + ' / ' + total;
    }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
