{% extends "base.html" %}
{% block title %}系统总览{% endblock %}
{% block content %}

<!-- 系统健康卡片 -->
<div class="row mb-3" id="health-cards">
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-proxy">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-hdd-network health-icon"></i>
                        <h6 class="card-title mb-0">代理池</h6>
                    </div>
                    <span class="badge bg-secondary" id="proxy-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="proxy-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-cache">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-lightning health-icon"></i>
                        <h6 class="card-title mb-0">缓存</h6>
                    </div>
                    <span class="badge bg-secondary" id="cache-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="cache-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-login">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-person-check health-icon"></i>
                        <h6 class="card-title mb-0">登录状态</h6>
                    </div>
                    <span class="badge bg-secondary" id="login-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="login-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-store">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-database health-icon"></i>
                        <h6 class="card-title mb-0">存储层</h6>
                    </div>
                    <span class="badge bg-secondary" id="store-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="store-detail">加载中...</div>
            </div>
        </div>
    </div>
</div>

<!-- 数据统计卡片 -->
<div class="row mb-4">
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-videos">0</div>
                <div class="stat-label">监控视频</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-analyzed">0</div>
                <div class="stat-label">已分析</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number text-danger" id="stat-high-risk">0</div>
                <div class="stat-label">高风险账号</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-monitored">0</div>
                <div class="stat-label">评论监测条数</div>
            </div>
        </div>
    </div>
</div>

<!-- 模块状态面板（可折叠） -->
<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#sys-detail" style="cursor:pointer">
        <span><i class="bi bi-diagram-3 me-2"></i>系统模块状态</span>
        <i class="bi bi-chevron-down" id="sys-chevron"></i>
    </div>
    <div class="collapse" id="sys-detail">
        <div class="card-body" id="sys-detail-body">加载中...</div>
    </div>
</div>

<!-- 视频列表 -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-camera-video me-2"></i>视频监控列表</h5>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-danger" id="btn-clear-all" onclick="clearAllData()" title="清空所有爬取数据">
            <i class="bi bi-archive-fill"></i>
        </button>
    </div>
</div>

<!-- UP主分组统计 -->
<div class="row mb-3" id="up-stats-row">
    <small class="text-muted">加载UP主统计...</small>
</div>

<!-- 视频网格 -->
<div class="row" id="video-grid">
    <div class="col-12 text-center py-4 text-muted">加载中...</div>
</div>

<!-- 翻页 -->
<div class="d-flex justify-content-between align-items-center mt-3" id="pagination-row" style="display:none">
    <small class="text-muted" id="page-info"></small>
    <div class="btn-group btn-group-sm" id="page-btns"></div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
// ---- 系统健康卡片更新 ----
function updateHealthCards() {
    fetch('/api/system/status')
        .then(r => r.json())
        .then(d => {
            if (!d.success) return;

            // 代理池
            const p = d.data.proxy;
            const pBadge = document.getElementById('proxy-badge');
            const pDetail = document.getElementById('proxy-detail');
            const pCard = document.getElementById('card-proxy');
            if (p.available) {
                pBadge.textContent = p.active + ' IP';
                pBadge.className = 'badge bg-success';
                pDetail.innerHTML = `活跃 <b>${p.active}</b> / 失效 ${p.failed}`;
                pCard.style.borderLeft = '3px solid var(--success)';
            } else {
                pBadge.textContent = '未启用';
                pBadge.className = 'badge bg-secondary';
                pDetail.textContent = p.message || '未启用';
                pCard.style.borderLeft = '3px solid var(--secondary)';
            }

            // 缓存
            const c = d.data.cache;
            const cBadge = document.getElementById('cache-badge');
            const cDetail = document.getElementById('cache-detail');
            const cCard = document.getElementById('card-cache');
            if (c.available) {
                cBadge.textContent = (c.hit_rate * 100).toFixed(0) + '%';
                cBadge.className = 'badge bg-info';
                cDetail.innerHTML = `条目 ${c.size} / 命中率 ${(c.hit_rate * 100).toFixed(0)}%`;
                cCard.style.borderLeft = '3px solid var(--info)';
            } else {
                cBadge.textContent = '未启用';
                cBadge.className = 'badge bg-secondary';
                cDetail.textContent = c.message || '未启用';
                cCard.style.borderLeft = '3px solid var(--secondary)';
            }

            // 登录
            const l = d.data.login;
            const lBadge = document.getElementById('login-badge');
            const lDetail = document.getElementById('login-detail');
            const lCard = document.getElementById('card-login');
            if (l.is_logged_in) {
                lBadge.textContent = '已登录';
                lBadge.className = 'badge bg-success';
                lDetail.innerHTML = 'SESSDATA <span class="text-success">有效</span>';
                lCard.style.borderLeft = '3px solid var(--success)';
            } else {
                lBadge.textContent = '未登录';
                lBadge.className = 'badge bg-warning text-dark';
                lDetail.innerHTML = '请前往 <a href="/crawler">爬虫控制</a> 扫码登录';
                lCard.style.borderLeft = '3px solid var(--warning)';
            }

            // 存储层
            const s = d.data.store;
            const sBadge = document.getElementById('store-badge');
            const sDetail = document.getElementById('store-detail');
            const sCard = document.getElementById('card-store');
            sBadge.textContent = s.current.toUpperCase();
            sBadge.className = 'badge bg-primary';
            sDetail.innerHTML = `当前: <b>${s.current}</b> / 支持: ${s.supported.join(', ')}`;
            sCard.style.borderLeft = '3px solid var(--primary)';

            // 详情面板
            const detail = document.getElementById('sys-detail-body');
            detail.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>代理池</h6>
                        <pre class="sys-pre">${JSON.stringify(p, null, 2)}</pre>
                    </div>
                    <div class="col-md-6">
                        <h6>缓 存</h6>
                        <pre class="sys-pre">${JSON.stringify(c, null, 2)}</pre>
                    </div>
                    <div class="col-md-6 mt-2">
                        <h6>登 录</h6>
                        <pre class="sys-pre">${JSON.stringify(l, null, 2)}</pre>
                    </div>
                    <div class="col-md-6 mt-2">
                        <h6>存 储</h6>
                        <pre class="sys-pre">${JSON.stringify(s, null, 2)}</pre>
                    </div>
                </div>`;
        })
        .catch(e => console.error('Health check failed:', e));
}

// ---- 视频列表 (UP主分组 + 桶内分页) ----
const BUCKET_PAGE_SIZE = 12;
const bucketPageStates = {};
const upGroupSortMode = {};  // {collId: 'views'|'comments'|'time'}
const RANGES = {
    views: [
        { key: 'v-high', label: '高播放 ≥1万',    min: 10000, max: Infinity },
        { key: 'v-mid',  label: '中播放 1000~1万', min: 1000,  max: 9999 },
        { key: 'v-low',  label: '低播放 100~999',  min: 100,   max: 999 },
        { key: 'v-tiny', label: '极低 <100',       min: 0,     max: 99 },
    ],
    comments: [
        { key: 'c-high', label: '高评论 ≥100',     min: 100,   max: Infinity },
        { key: 'c-mid',  label: '中评论 20~99',    min: 20,    max: 99 },
        { key: 'c-low',  label: '低评论 5~19',     min: 5,     max: 19 },
        { key: 'c-tiny', label: '极少 <5',          min: 0,     max: 4 },
    ],
};

function getTimeRanges() {
    const now = Math.floor(Date.now() / 1000);
    const DAY = 86400;
    return [
        { key: 't-today',   label: '今天',      min: now - DAY,       max: Infinity },
        { key: 't-yesterday',label: '昨天',      min: now - 2*DAY,    max: now - DAY - 1 },
        { key: 't-week',    label: '本周内',     min: now - 7*DAY,    max: now - 2*DAY - 1 },
        { key: 't-month',   label: '本月内',     min: now - 30*DAY,   max: now - 7*DAY - 1 },
        { key: 't-older',   label: '更早',       min: 0,              max: now - 30*DAY - 1 },
    ];
}

function loadVideos() {
    fetch('/api/videos?page=1&per_page=9999')
        .then(r => r.json())
        .then(d => {
            if (!d.success) return;
            const grid = document.getElementById('video-grid');
            if (!d.data || d.data.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="bi bi-inbox display-4 d-block mb-2"></i>暂无监控视频<br><small>请前往爬虫控制台采集数据</small></div>';
                document.getElementById('pagination-row').style.display = 'none';
                document.getElementById('up-stats-row').innerHTML = '';
                return;
            }

            // 分离热门榜视频 vs 其他视频
            const hotVideos = d.data.filter(v => v.source === 'hot');
            const restVideos = d.data.filter(v => v.source !== 'hot');

            // 帮函: 构建视频分组 HTML（按UP主归组 + 桶内分页）
            // sortModes: ['views','comments'] 默认; 热榜加 'time'
            const buildGroupHtml = (group, collId, showFirst, icon, sortModes = ['views','comments']) => {
                const totalVideos = group.videos.length;
                const totalViews = group.videos.reduce((s, v) => s + (v.view_count || 0), 0);
                const totalComments = group.videos.reduce((s, v) => s + (v.comment_count || 0), 0);
                if (!(collId in upGroupSortMode)) upGroupSortMode[collId] = sortModes[0];

                const buildBuckets = (mode) => {
                    const rs = mode === 'time' ? getTimeRanges() : RANGES[mode];
                    const valFn = mode === 'views' ? (v => v.view_count || 0)
                                : mode === 'time' ? (v => v.pubdate || 0)
                                : (v => v.comment_count || 0);
                    return rs.map(r => {
                        const vids = group.videos.filter(v => {
                            const val = valFn(v);
                            return val >= r.min && val <= r.max;
                        });
                        vids.sort((a, b) => valFn(b) - valFn(a));
                        const bucketKey = `${collId}-${r.key}`;
                        const totalPages = Math.max(1, Math.ceil(vids.length / BUCKET_PAGE_SIZE));
                        bucketPageStates[bucketKey] = { page: 1, totalPages, videos: vids, label: r.label };
                        return { ...r, bucketKey, count: vids.length, totalPages };
                    }).filter(b => b.count > 0);
                };

                const buckets = buildBuckets(sortModes[0]);

                const sortBtns = sortModes.map(m => {
                    const labels = { views: '播放量', comments: '评论数', time: '时间' };
                    const actives = { views: 'btn-outline-info', comments: 'btn-outline-info', time: 'btn-outline-warning' };
                    return `<button class="btn btn-sm ${actives[m]}${m===sortModes[0]?' active':''}" id="${collId}-sort-${m}" onclick="switchSortMode('${collId}','${m}')">${labels[m]}</button>`;
                }).join('');

                return `<div class="col-12 mb-3">
    <div class="card" id="${collId}-card">
        <div class="card-header d-flex justify-content-between align-items-center" style="cursor:pointer" data-bs-toggle="collapse" data-bs-target="#${collId}">
            <div>
                <strong><i class="${icon || 'bi bi-person-video'} me-1"></i>${group.ownerName}</strong>
                <span class="text-muted ms-2">${group.mid ? 'MID: ' + group.mid : ''}</span>
                <span class="badge bg-secondary ms-2">${totalVideos} 个视频</span>
                <span class="badge bg-info ms-1">${formatNum(totalViews)} 总播放</span>
                <span class="badge bg-success ms-1">${formatNum(totalComments)} 总评论</span>
            </div>
            <div class="d-flex align-items-center gap-2" onclick="event.stopPropagation()">
                <span class="small text-muted">排序:</span>
                <div class="btn-group btn-group-sm">${sortBtns}</div>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory('${collId}', '${group.mid || ''}', '${group.ownerName || ''}', ${totalVideos})" title="删除此分类下所有视频及相关数据">
                    <i class="bi bi-trash"></i>
                </button>
                <i class="bi bi-chevron-down small" id="${collId}-icon"></i>
            </div>
        </div>
        <div class="collapse${showFirst?' show':''}" id="${collId}">
            <div class="card-body pt-2" id="${collId}-body">${buckets.map(b => `
                <div class="mb-3">
                    <small class="fw-bold text-muted"><i class="bi bi-bar-chart"></i> ${b.label} (${b.count}个)</small>
                    <div class="row" id="${b.bucketKey}-body"></div>
                    <div class="d-flex justify-content-between align-items-center mt-1" id="${b.bucketKey}-pager" style="display:none">
                        <small class="text-muted" id="${b.bucketKey}-page-info"></small>
                        <div class="btn-group btn-group-sm" id="${b.bucketKey}-page-btns"></div>
                    </div>
                </div>`).join('')}
            </div>
        </div>
    </div>
</div>`;
            };

            let html = '';

            // ---- 热门榜（单独分组） ----
            if (hotVideos.length > 0) {
                html += buildGroupHtml(
                    { mid: 0, ownerName: '热门榜', videos: hotVideos },
                    'hot-group', true, 'bi bi-fire', ['views','comments','time']
                );
            }

            // ---- UP主分组（排除热门视频） ----
            const groups = {};
            restVideos.forEach(v => {
                const mid = v.owner_mid || 0;
                const on = v.owner_name || '未知UP主';
                const key = mid || 'unknown_' + on;
                if (!groups[key]) groups[key] = { mid, ownerName: on, videos: [] };
                groups[key].videos.push(v);
            });

            Object.values(groups).forEach((group, gi) => {
                html += buildGroupHtml(group, `up-group-${gi}`, gi === 0 && hotVideos.length === 0);
            });
            grid.innerHTML = html;

            // 展开时渲染
            document.querySelectorAll('[id^="hot-group"], [id^="up-group-"]').forEach(el => {
                el.addEventListener('show.bs.collapse', function() {
                    const cid = this.id;
                    Object.keys(bucketPageStates).forEach(bk => {
                        if (bk.startsWith(cid + '-')) renderBucketPage(bk);
                    });
                });
            });

            // 统计行
            allUpGroups = d.up_groups || [];
            const stats = document.getElementById('up-stats-row');
            if (allUpGroups.length > 0) {
                stats.innerHTML = allUpGroups.slice(0, 6).map(g =>
                    `<div class="col-lg-2 col-md-4 col-6 mb-2"><div class="border rounded p-1 text-center small"><strong title="${g.name}">${g.name.substring(0,10)}${g.name.length>10?'..':''}</strong><br><span class="text-muted">${g.count}视频 ${formatNum(g.total_views)}播放</span></div></div>`
                ).join('') + (allUpGroups.length > 6 ? `<div class="col-lg-2 col-md-4 col-6 mb-2 small text-muted align-self-center">...共 ${allUpGroups.length} 个UP主</div>` : '');
            }

            document.getElementById('pagination-row').style.display = 'none';
            document.getElementById('stat-videos').textContent = d.total || d.data.length;
            const analyzed = (d.data || []).filter(v => v.has_report).length;
            document.getElementById('stat-analyzed').textContent = analyzed;
            let monitored = 0;
            (d.data || []).forEach(v => { monitored += v.comment_count || 0; });
            document.getElementById('stat-monitored').textContent = formatNum(monitored);
        });
}

function renderBucketPage(bucketKey, page = 1) {
    const st = bucketPageStates[bucketKey];
    if (!st) return;
    st.page = page;
    const { videos, totalPages } = st;
    const start = (page - 1) * BUCKET_PAGE_SIZE;
    const end = Math.min(start + BUCKET_PAGE_SIZE, videos.length);
    const pageVideos = videos.slice(start, end);

    const body = document.getElementById(bucketKey + '-body');
    if (body) {
        body.innerHTML = pageVideos.map(v => renderVideoCard(v)).join('');
    }

    // 省略号翻页
    renderPagination(bucketKey, page, totalPages, videos.length);
}

function switchSortMode(collId, mode) {
    upGroupSortMode[collId] = mode;
    // 更新按钮状态
    ['views','comments','time'].forEach(m => {
        const btn = document.getElementById(collId + '-sort-' + m);
        if (btn) btn.classList.toggle('active', mode === m);
    });

    // 重建桶数据
    const rs = mode === 'time' ? getTimeRanges() : RANGES[mode];
    // 从现有的 bucketPageStates 聚合视频
    const allVids = [];
    const seen = new Set();
    Object.keys(bucketPageStates).forEach(bk => {
        if (bk.startsWith(collId + '-')) {
            const st = bucketPageStates[bk];
            st.videos.forEach(v => {
                if (!seen.has(v.bvid)) { seen.add(v.bvid); allVids.push(v); }
            });
        }
    });
    if (allVids.length === 0) return;

    // 重建 bucketPageStates
    const valFn = mode === 'views' ? (v => v.view_count || 0)
                : mode === 'time' ? (v => v.pubdate || 0)
                : (v => v.comment_count || 0);
    const newBuckets = rs.map(r => {
        const vids = allVids.filter(v => {
            const val = valFn(v);
            return val >= r.min && val <= r.max;
        });
        vids.sort((a, b) => valFn(b) - valFn(a));
        const bucketKey = `${collId}-${r.key}`;
        const totalPages = Math.max(1, Math.ceil(vids.length / BUCKET_PAGE_SIZE));
        bucketPageStates[bucketKey] = { page: 1, totalPages, videos: vids, label: r.label };
        return { bucketKey, count: vids.length, totalPages };
    }).filter(b => b.count > 0);

    // 重建 DOM
    const body = document.getElementById(collId + '-body');
    if (!body) return;
    body.innerHTML = newBuckets.map(b => `
        <div class="mb-3">
            <small class="fw-bold text-muted"><i class="bi bi-bar-chart"></i> ${bucketPageStates[b.bucketKey].label} (${b.count}个)</small>
            <div class="row" id="${b.bucketKey}-body"></div>
            <div class="d-flex justify-content-between align-items-center mt-1" id="${b.bucketKey}-pager" style="display:none">
                <small class="text-muted" id="${b.bucketKey}-page-info"></small>
                <div class="btn-group btn-group-sm" id="${b.bucketKey}-page-btns"></div>
            </div>
        </div>`).join('') || '<div class="text-muted small">无视频</div>';

    // 渲染所有新桶的第一页
    newBuckets.forEach(b => renderBucketPage(b.bucketKey, 1));
}

// 省略号翻页: ≤7页全显示, >7页用省略号
function renderPagination(bucketKey, page, totalPages, totalVideos) {
    const pager = document.getElementById(bucketKey + '-pager');
    const info = document.getElementById(bucketKey + '-page-info');
    const btns = document.getElementById(bucketKey + '-page-btns');
    if (totalPages <= 1) { pager.style.display = 'none'; return; }
    pager.style.display = 'flex';
    info.textContent = `${totalVideos}个 第${page}/${totalPages}页`;

    const pageNums = [];
    if (totalPages <= 7) {
        for (let p = 1; p <= totalPages; p++) pageNums.push(p);
    } else {
        pageNums.push(1);
        if (page > 4) pageNums.push('...');
        const start = Math.max(2, page - 1);
        const end = Math.min(totalPages - 1, page + 1);
        for (let p = start; p <= end; p++) pageNums.push(p);
        if (page < totalPages - 3) pageNums.push('...');
        pageNums.push(totalPages);
    }

    let h = `<button class="btn btn-sm btn-outline-secondary" onclick="renderBucketPage('${bucketKey}',${page-1})" ${page<=1?'disabled':''}>&laquo;</button>`;
    pageNums.forEach(p => {
        if (p === '...') {
            h += `<span class="btn btn-sm btn-outline-secondary disabled">...</span>`;
        } else {
            h += `<button class="btn btn-sm ${p===page?'btn-primary':'btn-outline-secondary'}" onclick="renderBucketPage('${bucketKey}',${p})">${p}</button>`;
        }
    });
    h += `<button class="btn btn-sm btn-outline-secondary" onclick="renderBucketPage('${bucketKey}',${page+1})" ${page>=totalPages?'disabled':''}>&raquo;</button>`;
    // 页码跳转输入框
    h += `<span class="ms-2 d-inline-flex align-items-center gap-1">
        <input type="number" class="form-control form-control-sm" id="${bucketKey}-jump-input"
               min="1" max="${totalPages}" value="${page}" style="width:60px"
               onkeydown="if(event.key==='Enter') jumpToPage('${bucketKey}', this.value, ${totalPages})">
        <button class="btn btn-sm btn-outline-secondary" onclick="jumpToPage('${bucketKey}',
               document.getElementById('${bucketKey}-jump-input').value, ${totalPages})">跳转</button>
    </span>`;
    btns.innerHTML = h;
}

function jumpToPage(bucketKey, rawValue, totalPages) {
    const page = parseInt(rawValue);
    if (isNaN(page) || page < 1 || page > totalPages) {
        showToast(`请输入 1~${totalPages} 的页码`, 'warning');
        return;
    }
    renderBucketPage(bucketKey, page);
}

function renderVideoCard(v) {
    return `<div class="col-6 col-md-4 col-lg-3 col-xl-2 mb-2">
        <div class="card video-card h-100" onclick="location.href='/video/${v.bvid}'" style="cursor:pointer">
            <button class="video-card-delete" onclick="event.stopPropagation(); deleteVideo('${v.bvid}', '${(v.title || '').replace(/'/g, "\\'")}')" title="删除">
                <i class="bi bi-x-lg"></i>
            </button>
            <div class="video-card-img" style="min-height:80px">
                ${v.pic ? `<img src="${v.pic}" alt="${v.title}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="video-card-placeholder" style="display:none;font-size:1.2em"><i class="bi bi-play-btn"></i></div>` : `<div class="video-card-placeholder" style="font-size:1.2em"><i class="bi bi-play-btn"></i></div>`}
            </div>
            <div class="card-body p-2">
                <div class="d-flex justify-content-between align-items-start">
                    <small class="text-truncate flex-grow-1 me-1" title="${v.title}" style="line-height:1.3">${v.title}</small>
                    <a href="https://www.bilibili.com/video/${v.bvid}" target="_blank" class="text-decoration-none text-muted flex-shrink-0" onclick="event.stopPropagation()" style="font-size:0.8em"><i class="bi bi-box-arrow-up-right"></i></a>
                </div>
                <div class="d-flex justify-content-between small text-muted mt-1">
                    <span><i class="bi bi-play-fill"></i> ${formatNum(v.view_count)}</span>
                    <span><i class="bi bi-chat-dots"></i> ${formatNum(v.reply_count)}</span>
                    <span><i class="bi bi-download"></i> ${v.comment_count}</span>
                </div>
                <div class="mt-1">${sourceBadgeMini(v.source)}</div>
            </div>
        </div>
    </div>`;
}

function sourceBadgeMini(source) {
    if (!source) return '';
    if (source === 'hot') return '<span class="badge bg-danger" style="font-size:0.6em">热门</span>';
    if (source === 'bvid') return '<span class="badge bg-primary" style="font-size:0.6em">BV</span>';
    if (source.startsWith('search:')) return '<span class="badge bg-info" style="font-size:0.6em">搜索</span>';
    if (source.startsWith('up:')) return '<span class="badge bg-success" style="font-size:0.6em">UP主</span>';
    return '';
}

function loadReportStats(videos) {
    let highRisk = 0;
    let done = 0;
    const analyzed = videos.filter(v => v.has_report);
    if (analyzed.length === 0) {
        document.getElementById('stat-high-risk').textContent = '0';
        return;
    }
    analyzed.forEach(v => {
        fetch('/api/report/' + v.bvid)
            .then(r => r.json())
            .then(d => {
                if (d.success && d.data && d.data.statistics) {
                    highRisk += d.data.statistics.high_risk_count || 0;
                }
                done++;
                if (done >= analyzed.length) {
                    document.getElementById('stat-high-risk').textContent = highRisk;
                }
            })
            .catch(() => { done++; });
    });
}

function formatNum(n) {
    if (!n) return '0';
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toLocaleString();
}

function sourceBadge(source) {
    if (!source) return '<span class="badge bg-light text-dark">未知来源</span>';
    if (source === 'hot') return '<span class="badge bg-danger"><i class="bi bi-fire"></i> 热门爬取</span>';
    if (source === 'bvid') return '<span class="badge bg-primary"><i class="bi bi-link-45deg"></i> 指定BV</span>';
    if (source.startsWith('search:')) {
        const kw = source.replace('search:', '');
        return `<span class="badge bg-info"><i class="bi bi-search"></i> 搜索: ${kw}</span>`;
    }
    if (source.startsWith('up:')) {
        const uid = source.replace('up:', '');
        return `<span class="badge bg-success"><i class="bi bi-person-video"></i> UP主: ${uid}</span>`;
    }
    return `<span class="badge bg-light text-dark">${source}</span>`;
}

// 折叠面板箭头旋转
document.addEventListener('DOMContentLoaded', () => {
    const sysDetail = document.getElementById('sys-detail');
    if (sysDetail) {
        sysDetail.addEventListener('show.bs.collapse', () => document.getElementById('sys-chevron').style.transform = 'rotate(180deg)');
        sysDetail.addEventListener('hide.bs.collapse', () => document.getElementById('sys-chevron').style.transform = 'rotate(0deg)');
    }
});

// 初始化
updateHealthCards();
loadVideos();
setInterval(updateHealthCards, 30000);
setInterval(loadVideos, 60000);

// ---- 删除单个视频数据 ----
function deleteVideo(bvid, title) {
    confirmDelete(
        `确定要删除「${title || bvid}」的所有数据吗？\n\n这将删除：\n  - 视频信息\n  - 评论数据\n  - 分析报告\n\n此操作不可撤销！`,
        () => fetch(`/api/data/video/${bvid}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    showToast(d.message, 'success');
                    loadVideos(); // 刷新列表
                } else {
                    showToast(d.message || '删除失败', 'error');
                    throw new Error(d.message);
                }
            })
    );
}

// ---- 删除分类数据 ----
function deleteCategory(collId, mid, name, count) {
    const label = mid ? `UP主「${name}」` : '「热门榜」';
    confirmDelete(
        `确定要删除 ${label} 下的全部数据吗？\n\n将删除:\n  - ${count} 个视频信息文件\n  - 对应的评论数据文件\n  - 对应的分析报告文件\n\n此操作不可撤销！`,
        () => {
            const body = mid ? { owner_mid: parseInt(mid) } : { source: 'hot' };
            fetch('/api/data/category', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            })
            .then(r => r.json())
            .then(d => {
                showToast(d.message, d.success ? 'success' : 'error');
                if (d.success) loadVideos();
            });
        }
    );
}

// ---- 清空所有数据 ----
function clearAllData() {
    confirmDelete(
        '确定要清空所有已爬取的数据吗？\n\n此操作将删除全部：\n  - 视频信息文件\n  - 评论数据文件\n  - 分析报告文件\n\n此操作不可撤销！建议先备份重要数据。',
        () => fetch('/api/data/all', { method: 'DELETE' })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    const detail = Object.entries(d.deleted || {})
                        .map(([k, v]) => `${k}: ${v} 个文件`).join(', ');
                    showToast(`${d.message}（${detail}）`, 'success');
                    loadVideos(); // 刷新列表
                } else {
                    showToast('清空失败', 'error');
                    throw new Error('clear failed');
                }
            })
    );
}
</script>
