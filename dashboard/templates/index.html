{% extends "base.html" %}
{% block title %}系统总览{% endblock %}
{% block content %}

<style>
.up-stat-card:hover { background: rgba(13,110,253,0.08); border-color: var(--bs-info) !important; }
/* 左右分栏布局 */
.up-sidebar {
    max-height: calc(100vh - 280px);
    overflow-y: auto;
    position: sticky;
    top: 20px;
}
.up-sidebar .list-group-item.active {
    background-color: var(--bs-info);
    border-color: var(--bs-info);
}
.up-sidebar .list-group-item:hover:not(.active) {
    background-color: rgba(13, 110, 253, 0.08);
}
#video-content-area {
    min-height: 300px;
}
</style>

<!-- 系统健康卡片 -->
<div class="row mb-3" id="health-cards">
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-proxy">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-hdd-network health-icon"></i>
                        <h6 class="card-title mb-0">代理池</h6>
                    </div>
                    <span class="badge bg-secondary" id="proxy-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="proxy-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-cache">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-lightning health-icon"></i>
                        <h6 class="card-title mb-0">缓存</h6>
                    </div>
                    <span class="badge bg-secondary" id="cache-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="cache-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-login">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-person-check health-icon"></i>
                        <h6 class="card-title mb-0">登录状态</h6>
                    </div>
                    <span class="badge bg-secondary" id="login-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="login-detail">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card health-card" id="card-store">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div><i class="bi bi-database health-icon"></i>
                        <h6 class="card-title mb-0">存储层</h6>
                    </div>
                    <span class="badge bg-secondary" id="store-badge">--</span>
                </div>
                <div class="health-detail mt-2" id="store-detail">加载中...</div>
            </div>
        </div>
    </div>
</div>

<!-- 数据统计卡片 -->
<div class="row mb-4">
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-videos">0</div>
                <div class="stat-label">监控视频</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card" style="cursor:pointer" onclick="filterAnalyzed()" title="点击筛选已分析视频" id="stat-analyzed-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-analyzed">0</div>
                <div class="stat-label">已分析 <small id="filter-indicator" class="text-info" style="display:none">★筛选</small></div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number text-danger" id="stat-high-risk">0</div>
                <div class="stat-label">高风险账号</div>
            </div>
        </div>
    </div>
    <div class="col-lg-3 col-md-6 mb-2">
        <div class="card stat-card">
            <div class="card-body text-center">
                <div class="stat-number" id="stat-monitored">0</div>
                <div class="stat-label">评论监测条数</div>
            </div>
        </div>
    </div>
</div>

<!-- 模块状态面板（可折叠） -->
<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#sys-detail" style="cursor:pointer">
        <span><i class="bi bi-diagram-3 me-2"></i>系统模块状态</span>
        <i class="bi bi-chevron-down" id="sys-chevron"></i>
    </div>
    <div class="collapse" id="sys-detail">
        <div class="card-body" id="sys-detail-body">加载中...</div>
    </div>
</div>

<!-- 视频列表 -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0"><i class="bi bi-camera-video me-2"></i>视频监控列表</h5>
    <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-danger" id="btn-clear-all" onclick="clearAllData()" title="清空所有爬取数据">
            <i class="bi bi-archive-fill"></i>
        </button>
    </div>
</div>

<!-- 左右分栏 -->
<div class="row">
    <!-- 左侧：UP主列表 -->
    <div class="col-lg-3 col-md-4 mb-3">
        <div class="up-sidebar" id="up-sidebar">
            <div class="list-group list-group-flush" id="up-list">
                <div class="text-center py-3 text-muted small">加载中...</div>
            </div>
        </div>
    </div>
    <!-- 右侧：视频内容 -->
    <div class="col-lg-9 col-md-8">
        <div id="video-content-area">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-arrow-left display-4 d-block mb-2"></i>
                请从左侧选择 UP主 或 热门榜
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
// ---- 系统健康卡片更新 ----
function updateHealthCards() {
    fetch('/api/system/status')
        .then(r => r.json())
        .then(d => {
            if (!d.success) return;

            // 代理池
            const p = d.data.proxy;
            const pBadge = document.getElementById('proxy-badge');
            const pDetail = document.getElementById('proxy-detail');
            const pCard = document.getElementById('card-proxy');
            if (p.available) {
                pBadge.textContent = p.active + ' IP';
                pBadge.className = 'badge bg-success';
                pDetail.innerHTML = `活跃 <b>${p.active}</b> / 失效 ${p.failed}`;
                pCard.style.borderLeft = '3px solid var(--success)';
            } else {
                pBadge.textContent = '未启用';
                pBadge.className = 'badge bg-secondary';
                pDetail.textContent = p.message || '未启用';
                pCard.style.borderLeft = '3px solid var(--secondary)';
            }

            // 缓存
            const c = d.data.cache;
            const cBadge = document.getElementById('cache-badge');
            const cDetail = document.getElementById('cache-detail');
            const cCard = document.getElementById('card-cache');
            if (c.available) {
                cBadge.textContent = (c.hit_rate * 100).toFixed(0) + '%';
                cBadge.className = 'badge bg-info';
                cDetail.innerHTML = `条目 ${c.size} / 命中率 ${(c.hit_rate * 100).toFixed(0)}%`;
                cCard.style.borderLeft = '3px solid var(--info)';
            } else {
                cBadge.textContent = '未启用';
                cBadge.className = 'badge bg-secondary';
                cDetail.textContent = c.message || '未启用';
                cCard.style.borderLeft = '3px solid var(--secondary)';
            }

            // 登录
            const l = d.data.login;
            const lBadge = document.getElementById('login-badge');
            const lDetail = document.getElementById('login-detail');
            const lCard = document.getElementById('card-login');
            if (l.is_logged_in) {
                lBadge.textContent = '已登录';
                lBadge.className = 'badge bg-success';
                lDetail.innerHTML = 'SESSDATA <span class="text-success">有效</span>';
                lCard.style.borderLeft = '3px solid var(--success)';
            } else {
                lBadge.textContent = '未登录';
                lBadge.className = 'badge bg-warning text-dark';
                lDetail.innerHTML = '请前往 <a href="/crawler">爬虫控制</a> 扫码登录';
                lCard.style.borderLeft = '3px solid var(--warning)';
            }

            // 存储层
            const s = d.data.store;
            const sBadge = document.getElementById('store-badge');
            const sDetail = document.getElementById('store-detail');
            const sCard = document.getElementById('card-store');
            sBadge.textContent = s.current.toUpperCase();
            sBadge.className = 'badge bg-primary';
            sDetail.innerHTML = `当前: <b>${s.current}</b> / 支持: ${s.supported.join(', ')}`;
            sCard.style.borderLeft = '3px solid var(--primary)';

            // 详情面板
            const detail = document.getElementById('sys-detail-body');
            detail.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>代理池</h6>
                        <pre class="sys-pre">${JSON.stringify(p, null, 2)}</pre>
                    </div>
                    <div class="col-md-6">
                        <h6>缓 存</h6>
                        <pre class="sys-pre">${JSON.stringify(c, null, 2)}</pre>
                    </div>
                    <div class="col-md-6 mt-2">
                        <h6>登 录</h6>
                        <pre class="sys-pre">${JSON.stringify(l, null, 2)}</pre>
                    </div>
                    <div class="col-md-6 mt-2">
                        <h6>存 储</h6>
                        <pre class="sys-pre">${JSON.stringify(s, null, 2)}</pre>
                    </div>
                </div>`;
        })
        .catch(e => {
            console.error('Health check failed:', e);
            // 所有卡片展示"服务未启动"状态
            ['proxy','cache','login','store'].forEach(s => {
                const badge = document.getElementById(s + '-badge');
                const detail = document.getElementById(s + '-detail');
                const card = document.getElementById('card-' + s);
                if (badge) { badge.textContent = '离线'; badge.className = 'badge bg-danger'; }
                if (detail) detail.textContent = 'Dashboard 服务未启动';
                if (card) card.style.borderLeft = '3px solid var(--danger)';
            });
        });
}

function renderVideoCard(v) {
    return `<div class="col-6 col-md-4 col-lg-3 col-xl-2 mb-2">
        <div class="card video-card h-100" onclick="location.href='/video/${v.bvid}'" style="cursor:pointer">
            <button class="video-card-delete" onclick="event.stopPropagation(); deleteVideo('${v.bvid}', '${(v.title || '').replace(/'/g, "\\'")}')" title="删除">
                <i class="bi bi-x-lg"></i>
            </button>
            <div class="video-card-img" style="min-height:80px">
                ${v.pic ? `<img src="${v.pic}" alt="${v.title}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="video-card-placeholder" style="display:none;font-size:1.2em"><i class="bi bi-play-btn"></i></div>` : `<div class="video-card-placeholder" style="font-size:1.2em"><i class="bi bi-play-btn"></i></div>`}
            </div>
            <div class="card-body p-2">
                <div class="d-flex justify-content-between align-items-start">
                    <small class="text-truncate flex-grow-1 me-1" title="${v.title}" style="line-height:1.3">${v.title}</small>
                    <a href="https://www.bilibili.com/video/${v.bvid}" target="_blank" class="text-decoration-none text-muted flex-shrink-0" onclick="event.stopPropagation()" style="font-size:0.8em"><i class="bi bi-box-arrow-up-right"></i></a>
                </div>
                <div class="d-flex justify-content-between small text-muted mt-1">
                    <span><i class="bi bi-play-fill"></i> ${formatNum(v.view_count)}</span>
                    <span><i class="bi bi-chat-dots"></i> ${formatNum(v.reply_count)}</span>
                    <span><i class="bi bi-download"></i> ${v.comment_count}</span>
                </div>
                <div class="mt-1">${sourceBadgeMini(v.source)}</div>
            </div>
        </div>
    </div>`;
}

function sourceBadgeMini(source) {
    if (!source) return '';
    if (source === 'hot') return '<span class="badge bg-danger" style="font-size:0.6em">热门</span>';
    if (source === 'bvid') return '<span class="badge bg-primary" style="font-size:0.6em">BV</span>';
    if (source.startsWith('search:')) return '<span class="badge bg-info" style="font-size:0.6em">搜索</span>';
    if (source.startsWith('up:')) return '<span class="badge bg-success" style="font-size:0.6em">UP主</span>';
    return '';
}

function loadReportStats(videos) {
    let highRisk = 0;
    let done = 0;
    const analyzed = videos.filter(v => v.has_report);
    if (analyzed.length === 0) {
        document.getElementById('stat-high-risk').textContent = '0';
        return;
    }
    analyzed.forEach(v => {
        fetch('/api/report/' + v.bvid)
            .then(r => r.json())
            .then(d => {
                if (d.success && d.data && d.data.statistics) {
                    highRisk += d.data.statistics.high_risk_count || 0;
                }
                done++;
                if (done >= analyzed.length) {
                    document.getElementById('stat-high-risk').textContent = highRisk;
                }
            })
            .catch(() => { done++; });
    });
}

function formatNum(n) {
    if (!n) return '0';
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toLocaleString();
}

function sourceBadge(source) {
    if (!source) return '<span class="badge bg-light text-dark">未知来源</span>';
    if (source === 'hot') return '<span class="badge bg-danger"><i class="bi bi-fire"></i> 热门爬取</span>';
    if (source === 'bvid') return '<span class="badge bg-primary"><i class="bi bi-link-45deg"></i> 指定BV</span>';
    if (source.startsWith('search:')) {
        const kw = source.replace('search:', '');
        return `<span class="badge bg-info"><i class="bi bi-search"></i> 搜索: ${kw}</span>`;
    }
    if (source.startsWith('up:')) {
        const uid = source.replace('up:', '');
        return `<span class="badge bg-success"><i class="bi bi-person-video"></i> UP主: ${uid}</span>`;
    }
    return `<span class="badge bg-light text-dark">${source}</span>`;
}

// 折叠面板箭头旋转
document.addEventListener('DOMContentLoaded', () => {
    const sysDetail = document.getElementById('sys-detail');
    if (sysDetail) {
        sysDetail.addEventListener('show.bs.collapse', () => document.getElementById('sys-chevron').style.transform = 'rotate(180deg)');
        sysDetail.addEventListener('hide.bs.collapse', () => document.getElementById('sys-chevron').style.transform = 'rotate(0deg)');
    }
});

// 初始化
updateHealthCards();
loadVideos();
setInterval(updateHealthCards, 30000);
setInterval(loadVideos, 60000);

// ---- 删除单个视频数据 ----
function deleteVideo(bvid, title) {
    confirmDelete(
        `确定要删除「${title || bvid}」的所有数据吗？\n\n这将删除：\n  - 视频信息\n  - 评论数据\n  - 分析报告\n\n此操作不可撤销！`,
        () => fetch(`/api/data/video/${bvid}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    showToast(d.message, 'success');
                    // 刷新列表，并在完成后重新选中当前分组
                    if (_selKey) {
                        loadVideos(() => selectUpGroup(_selKey, _selLabel || _selKey));
                    } else {
                        loadVideos();
                    }
                } else {
                    showToast(d.message || '删除失败', 'error');
                    throw new Error(d.message);
                }
            })
    );
}

// ---- UP主定位 + 已分析筛选 ----
let _analyzedFilter = false;


function filterAnalyzed() {
    _analyzedFilter = !_analyzedFilter;
    const indicator = document.getElementById('filter-indicator');
    const card = document.getElementById('stat-analyzed-card');
    if (_analyzedFilter) {
        indicator.style.display = 'inline';
        card.style.borderLeft = '3px solid var(--info)';
        card.style.backgroundColor = 'rgba(13,110,253,0.05)';
    } else {
        indicator.style.display = 'none';
        card.style.borderLeft = '';
        card.style.backgroundColor = '';
    }
    // ★ v2.32 fix: 筛选后总是选中「全部」，展示所有筛选后的视频
    // 根因：若保持之前选中的UP主，而该UP主下没有已分析视频，右侧会空白
    loadVideos(() => {
        _selKey = 'all';
        _selLabel = _analyzedFilter ? '已分析视频' : '全部视频';
        _selVideos = (window._allVideos || []).slice();
        _selPage = 1;
        // 清除侧边栏高亮（选中「全部」时不高亮任何UP主）
        document.querySelectorAll('#up-list .list-group-item').forEach(el => el.classList.remove('active'));
        renderSelContent(_selLabel);
    });
}

// ---- 删除分类数据 ----

// ---- 清空所有数据 ----
function clearAllData() {
    confirmDelete(
        '确定要清空所有已爬取的数据吗？\n\n此操作将删除全部：\n  - 视频信息文件\n  - 评论数据文件\n  - 分析报告文件\n\n此操作不可撤销！建议先备份重要数据。',
        () => fetch('/api/data/all', { method: 'DELETE' })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    const detail = Object.entries(d.deleted || {})
                        .map(([k, v]) => `${k}: ${v} 个文件`).join(', ');
                    showToast(`${d.message}（${detail}）`, 'success');
                    loadVideos(); // 刷新列表
                } else {
                    showToast('清空失败', 'error');
                    throw new Error('clear failed');
                }
            })
    );
}
// ========== 左右分栏新逻辑 ==========

// 渲染左侧 UP主列表（含热门榜）
function renderUpSidebar(videos, upGroups) {
    const list = document.getElementById('up-list');
    if (!list) return;
    const hotVideos = (videos || []).filter(v => v.source === 'hot');
    let html = '';

    // 热门榜
    if (hotVideos.length > 0) {
        html += '<a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" ' +
                 'onclick="event.preventDefault();selectUpGroup(\'hot\',\'热门榜\')">' +
                 '<span><i class="bi bi-fire me-2"></i>热门榜</span>' +
                 '<span class="badge bg-danger rounded-pill">' + hotVideos.length + '</span></a>';
    }

    // UP主列表
    (upGroups || []).forEach(g => {
        const name = (g.name || '').substring(0, 12) + ((g.name || '').length > 12 ? '..' : '');
        const safe = (g.name || '').replace(/'/g, "\\'");
        html += '<a href="#" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" ' +
                 'onclick="event.preventDefault();selectUpGroup(\'up_' + g.mid + '\',\'' + safe + '\')">' +
                 '<span><i class="bi bi-person-video me-2"></i>' + name + '</span>' +
                 '<span class="badge bg-primary rounded-pill">' + g.count + '</span></a>';
    });

    list.innerHTML = html || '<div class="text-center py-3 text-muted small">暂无数据</div>';
}

// 当前选中的分组状态
let _selKey = null;
let _selLabel = '';
let _selVideos = [];
let _selPage = 1;
const _SEL_PAGE_SIZE = 24;

// 点击左侧 UP主 → 右侧显示视频
function selectUpGroup(key, label) {
    // 更新侧边栏高亮
    document.querySelectorAll('#up-list .list-group-item').forEach(el => el.classList.remove('active'));
    if (event && event.currentTarget) {
        event.currentTarget.classList.add('active');
    } else {
        // 兼容无 event 的调用场景
        const items = document.querySelectorAll('#up-list .list-group-item');
        for (let i = 0; i < items.length; i++) {
            if (items[i].getAttribute('onclick') && items[i].getAttribute('onclick').indexOf(key) >= 0) {
                items[i].classList.add('active');
                break;
            }
        }
    }

    _selKey = key;
    _selLabel = label || '';
    _selPage = 1;

    // 筛选视频
    if (key === 'hot') {
        _selVideos = (window._allVideos || []).filter(v => v.source === 'hot');
    } else if (key === 'all') {
        _selVideos = (window._allVideos || []).slice();
    } else {
        const mid = key.replace('up_', '');
        _selVideos = (window._allVideos || []).filter(v => String(v.owner_mid) === String(mid));
    }

    renderSelContent(label);
}

// 渲染右侧视频内容区
function renderSelContent(label) {
    const area = document.getElementById('video-content-area');
    if (!area) return;

    area.innerHTML = '' +
        '<div class="d-flex justify-content-between align-items-center mb-3">' +
            '<h6 class="mb-0"><i class="bi bi-collection-play me-2"></i>' + (label || '') + '（' + _selVideos.length + ' 个视频）</h6>' +
        '</div>' +
        '<div class="row" id="sel-video-grid"></div>' +
        '<div class="d-flex justify-content-between align-items-center mt-3" id="sel-pagination"></div>';

    renderSelPage();
}

// 渲染当前页视频卡片
function renderSelPage() {
    const grid = document.getElementById('sel-video-grid');
    if (!grid) return;

    const start = (_selPage - 1) * _SEL_PAGE_SIZE;
    const end = Math.min(start + _SEL_PAGE_SIZE, _selVideos.length);
    const pageVideos = _selVideos.slice(start, end);

    grid.innerHTML = pageVideos.map(v => renderVideoCard(v)).join('');

    renderSelPagination();
}

// 渲染翻页控件
function renderSelPagination() {
    const pager = document.getElementById('sel-pagination');
    if (!pager) return;

    const totalPages = Math.max(1, Math.ceil(_selVideos.length / _SEL_PAGE_SIZE));
    if (totalPages <= 1) { pager.innerHTML = ''; return; }

    let html = '<small class="text-muted me-2">第 ' + _selPage + ' / ' + totalPages + ' 页，共 ' + _selVideos.length + ' 个</small><div class="btn-group btn-group-sm">';
    html += '<button class="btn btn-sm btn-outline-secondary" onclick="_selPage=Math.max(1,_selPage-1);renderSelPage()" ' + (_selPage <= 1 ? 'disabled' : '') + '>‹ 上一页</button>';

    // 页码
    const pages = [];
    if (totalPages <= 7) {
        for (let p = 1; p <= totalPages; p++) pages.push(p);
    } else {
        pages.push(1);
        if (_selPage > 4) pages.push('...');
        const ps = Math.max(2, _selPage - 1);
        const pe = Math.min(totalPages - 1, _selPage + 1);
        for (let p = ps; p <= pe; p++) pages.push(p);
        if (_selPage < totalPages - 3) pages.push('...');
        pages.push(totalPages);
    }

    pages.forEach(p => {
        if (p === '...') {
            html += '<span class="btn btn-sm btn-outline-secondary disabled">...</span>';
        } else {
            html += '<button class="btn btn-sm ' + (p === _selPage ? 'btn-primary' : 'btn-outline-secondary') + '" onclick="_selPage=' + p + ';renderSelPage()">' + p + '</button>';
        }
    });

    html += '<button class="btn btn-sm btn-outline-secondary" onclick="_selPage=Math.min(' + totalPages + ',_selPage+1);renderSelPage()" ' + (_selPage >= totalPages ? 'disabled' : '') + '>下一页 ›</button>';
    html += '</div>';
    pager.innerHTML = html;
}

function loadVideos(callback) {
    fetch('/api/videos?page=1&per_page=9999')
        .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        })
        .then(d => {
            if (!d.success) return;

            // 根据筛选标志过滤视频
            let videos = d.data || [];
            if (_analyzedFilter) {
                videos = videos.filter(v => v.has_report);
            }
            window._allVideos = videos;

            // 重新计算 upGroups（基于过滤后的 videos）
            let upGroups = d.up_groups || [];
            if (_analyzedFilter) {
                const upMap = {};
                videos.forEach(v => {
                    if (!v.owner_mid) return;
                    if (!upMap[v.owner_mid]) {
                        upMap[v.owner_mid] = { mid: v.owner_mid, name: v.owner_name, count: 0 };
                    }
                    upMap[v.owner_mid].count++;
                });
                upGroups = Object.values(upMap);
            }

            // 更新顶部统计卡片（使用过滤后的 videos）
            document.getElementById('stat-videos').textContent = videos.length;
            const analyzed = _analyzedFilter ? videos.length : (d.data || []).filter(v => v.has_report).length;
            document.getElementById('stat-analyzed').textContent = analyzed;
            let monitored = 0;
            videos.forEach(v => { monitored += v.comment_count || 0; });
            document.getElementById('stat-monitored').textContent = formatNum(monitored);

            // 渲染左侧 UP主列表（传入过滤后的 videos 和 upGroups）
            if (typeof renderUpSidebar === 'function') {
                renderUpSidebar(videos, upGroups);
            }

            // 更新高风险统计（使用过滤后的 videos）
            if (typeof loadReportStats === 'function') {
                loadReportStats(videos);
            }

            // 若有回调，执行回调（如：删除后重新选中分组）
            if (typeof callback === 'function') callback();
        })
        .catch(e => {
            console.error('Video list fetch failed:', e);
            const list = document.getElementById('up-list');
            if (list) list.innerHTML = '<div class="text-center py-3 text-danger small">加载失败<br><button class="btn btn-sm btn-outline-primary mt-1" onclick="loadVideos()">重试</button></div>';
        });
}

</script>
{% endblock %}
